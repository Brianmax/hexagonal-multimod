services:
  postgres_db:
    image: postgres:15
    container_name: database
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: postgres
      POSTGRES_DB: arquitectura_hexagonal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: spring-app
    environment:
      DB_HOST: postgres_db
    ports:
      - "8080:8080"
    depends_on:
      postgres_db:
        condition: service_healthy
volumes:
  pgdata: